<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Your Health Report – MedReport Simplifier</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fef9f0;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 235, 205, 0.4) 0%, rgba(255, 245, 235, 0) 80%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            color: #2c3e2f;
        }

        .container {
            max-width: 880px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            padding: 2rem 2rem 2.5rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2), 0 1px 2px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2b7a62, #e3a56d);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h1::before {
            content: "📋";
            font-size: 2rem;
            background: none;
            -webkit-background-clip: unset;
            color: #2b7a62;
        }

        .subhead {
            color: #5a6e4a;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            border-left: 3px solid #e3a56d;
            padding-left: 1rem;
        }

        /* Summary cards */
        .summary-card {
            background: #fef9f0;
            border-radius: 32px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #ffe5ce;
        }

        .metric-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }

        .metric-item {
            flex: 1;
            min-width: 160px;
            background: white;
            border-radius: 28px;
            padding: 0.8rem 1rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            border: 1px solid #f0e3d4;
        }

        .metric-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8c9a7a;
            margin-bottom: 6px;
        }

        .metric-value {
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .severity-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .alert-box {
            background: #fff0e6;
            border-radius: 24px;
            padding: 1rem;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #b45f2b;
            border-left: 4px solid #e3a56d;
        }

        hr {
            margin: 1.8rem 0;
            border: 0;
            height: 1px;
            background: linear-gradient(to right, #e9d6b0, transparent);
        }

        .diet-card {
            background: #eef6f0;
            border-radius: 32px;
            padding: 1.5rem;
            margin: 1.5rem 0;
        }

        .precautions-list {
            background: #fff9ef;
            border-radius: 28px;
            padding: 1.5rem;
            list-style-type: none;
        }

        .precautions-list li {
            margin-bottom: 10px;
            padding-left: 24px;
            position: relative;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .precautions-list li::before {
            content: "🛡️";
            position: absolute;
            left: 0;
            top: 0;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .btn {
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #2b7a62;
            color: white;
            box-shadow: 0 4px 8px rgba(43,122,98,0.2);
        }

        .btn-primary:hover {
            background: #1f5e4b;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #e3a56d;
            color: #2c3e2f;
        }

        .btn-secondary:hover {
            background: #d4904a;
            transform: translateY(-2px);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 1rem;
            color: #5a6e4a;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
        }

        .back-link:hover {
            color: #2b7a62;
            gap: 10px;
        }

        @media (max-width: 650px) {
            .container {
                padding: 1.5rem;
            }
            .metric-grid {
                flex-direction: column;
            }
            .button-group {
                flex-direction: column;
            }
            .btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Your Personalized Health Report</h1>
    <div class="subhead">✔️ Simple language • Actionable steps • Personalised for you</div>

    <!-- Health summary with severity metrics (dynamic) -->
    <div class="summary-card">
        <div style="font-weight: 600; margin-bottom: 12px;">📊 Your health at a glance</div>
        <div id="severityMetrics" class="metric-grid">
            <!-- This will be populated from the explanation HTML.
                 But we'll restructure to avoid duplication. However the explanation already contains the list.
                 To keep consistent, we'll just display the explanation as is but styled.
            -->
        </div>
        <div id="explanationContainer">
            {{ explanation | safe }}
        </div>
    </div>

    <!-- Diet plan card -->
    <div class="diet-card">
        {{ diet_plan | safe }}
    </div>

    <!-- Precautions -->
    <div>
        {{ precautions | safe }}
    </div>

    <!-- Action buttons -->
    <div class="button-group">
        <button class="btn btn-primary" onclick="downloadAsText()">📄 Download as Text</button>
        <button class="btn btn-secondary" onclick="window.print();">🖨️ Save as PDF (Print)</button>
    </div>

    <div style="text-align: center; margin-top: 1.5rem;">
        <a href="/" class="back-link">← Analyze Another Report</a>
    </div>
</div>

<script>
    function downloadAsText() {
        const container = document.querySelector('.container').cloneNode(true);
        // Remove buttons and back link from the cloned content
        container.querySelectorAll('.button-group, .back-link, .btn, .btn-primary, .btn-secondary').forEach(el => el.remove());
        // Also remove any extraneous button remnants
        const content = container.innerText.trim();
        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'health_report.txt';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // Optional: improve the display of severity items from the existing explanation HTML
    // The explanation from Flask already contains <ul> with coloured dots.
    // We'll simply wrap it nicely – no extra JS needed.
    // But to make it more card-like, we can add a class to the existing <ul>.
    document.addEventListener('DOMContentLoaded', function() {
        let summaryDiv = document.getElementById('explanationContainer');
        if (summaryDiv) {
            let ul = summaryDiv.querySelector('ul');
            if (ul) {
                ul.style.listStyle = 'none';
                ul.style.padding = '0';
                let items = ul.querySelectorAll('li');
                items.forEach(li => {
                    li.style.marginBottom = '12px';
                    li.style.fontSize = '0.95rem';
                    li.style.display = 'flex';
                    li.style.alignItems = 'center';
                    li.style.gap = '8px';
                    li.style.flexWrap = 'wrap';
                    // preserve the coloured dot already inside
                });
            }
            let alertP = summaryDiv.querySelector('p');
            if (alertP && alertP.innerText.includes('Critical alerts')) {
                alertP.classList.add('alert-box');
            }
        }
    });
</script>
</body>
</html>
